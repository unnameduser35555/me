<!DOCTYPE html>
<html lang="ja">
    <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ページタイトル -->
  <title>Login UI</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- ファビコン（ブラウザタブのアイコン） -->
  <link rel="icon" href="favicon.ico" type="image/x-icon">

  <style>
    /* ここにCSS */
  </style>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
font-family:Poppins;
background:#020617;
}

/* Aurora background */
.bg{
position:fixed;
inset:0;
z-index:0;
background:
radial-gradient(circle at 20% 30%,rgba(120,0,255,.35),transparent 40%),
radial-gradient(circle at 80% 70%,rgba(0,100,255,.35),transparent 40%),
radial-gradient(circle at 50% 50%,rgba(255,0,200,.25),transparent 50%),
#020617;
animation:aurora 20s ease infinite alternate;
}
@keyframes aurora{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(90deg)}
}

/* star layers */
.layer1,.layer2,.layer3{
position:fixed;
inset:0;
z-index:1;
pointer-events:none;
}
.star{
position:absolute;
background:white;
border-radius:50%;
opacity:.8;
}
.layer1 .star{width:1px;height:1px}
.layer2 .star{width:2px;height:2px}
.layer3 .star{width:3px;height:3px}

/* shooting star */
.shoot{
position:fixed;
width:3px;
height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 3s linear forwards;
z-index:2;
}
@keyframes shoot{
0%{transform:translate(-200px,-200px);opacity:0;}
10%{opacity:1;}
100%{transform:translate(800px,600px);opacity:0;}
}

/* card */
.card{
position:relative;
z-index:10;
width:340px;
padding:40px;
border-radius:28px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(30px);
box-shadow:0 60px 150px rgba(0,0,0,.9),0 0 60px rgba(120,80,255,.3);
color:white;
animation:open 1.2s cubic-bezier(.16,1,.3,1) forwards,float 6s ease-in-out infinite 1.2s;
opacity:0;
transform:translateY(100px) scale(.8);
}
@keyframes open{
0%{opacity:0;transform:translateY(100px) scale(.8);filter:blur(20px);}
100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0);}
}
@keyframes float{0%{transform:translateY(0)}50%{transform:translateY(-12px)}100%{transform:translateY(0)}}

/* input */
.field{position:relative;margin-top:18px;}
.field input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:rgba(255,255,255,.15);
color:white;
outline:none;
}
.field label{
position:absolute;
left:14px;
top:14px;
color:#bbb;
transition:.25s;
pointer-events:none;
}
.field input:focus + label,
.field input:not(:placeholder-shown) + label{
top:-10px;
font-size:12px;
color:#a78bfa;
}

/* button */
.btn{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:16px;
background:linear-gradient(135deg,#6366f1,#9333ea);
color:white;
font-weight:600;
cursor:pointer;
position:relative;
}

/* loading */
.loading{
border:3px solid rgba(255,255,255,.3);
border-top:3px solid white;
border-radius:50%;
width:18px;
height:18px;
animation:spin 1s linear infinite;
margin:auto;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* notification ガラス風 */
.notify{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-30px);
padding:12px 24px;
border-radius:16px;
color:white;
font-weight:600;
font-size:16px;
opacity:0;
pointer-events:none;
z-index:20;
display:flex;
align-items:center;
gap:8px;
backdrop-filter:blur(10px);
background:rgba(255,255,255,0.1);
box-shadow:0 8px 30px rgba(0,0,0,0.4);
transition:opacity .4s, transform .4s;
}
.notify.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}
.notify.success{background:rgba(34,197,94,0.2);}
.notify.error{background:rgba(239,68,68,0.2);}
.notify svg{width:20px;height:20px;flex-shrink:0;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="layer1"></div>
<div class="layer2"></div>
<div class="layer3"></div>

<div class="card">
<h2>Login</h2>
<div class="field">
<input placeholder=" " id="email">
<label>Email</label>
</div>
<div class="field">
<input type="password" placeholder=" " id="pass">
<label>Password</label>
</div>
<button class="btn" id="loginBtn">Sign In</button>
</div>

<!-- 通知 -->
<div class="notify" id="notify"></div>

<script>
/* star generator */
function stars(layer,count){
let el=document.querySelector(layer)
for(let i=0;i<count;i++){
let s=document.createElement("div")
s.className="star"
s.style.top=Math.random()*100+"%"
s.style.left=Math.random()*100+"%"
el.appendChild(s)
}}
stars(".layer1",120)
stars(".layer2",70)
stars(".layer3",40)

/* shooting stars */
setInterval(()=>{
let s=document.createElement("div")
s.className="shoot"
s.style.top=Math.random()*40+"%"
s.style.left=Math.random()*40+"%"
document.body.appendChild(s)
setTimeout(()=>s.remove(),3000)
},5000)

/* login handling */
const btn=document.getElementById("loginBtn")
const notify=document.getElementById("notify")

btn.onclick=()=>{
btn.disabled=true
btn.innerHTML='<div class="loading"></div>'

setTimeout(()=>{
let email=document.getElementById("email").value
let pass=document.getElementById("pass").value

btn.disabled=false

// 成功判定
if(email==="admin" && pass==="1234"){
notify.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.2l-3.5-3.5 1.4-1.4L9 13.4l7.1-7.1 1.4 1.4z"/></svg> Success`
notify.className="notify success show"
setTimeout(()=>{window.location.href="endcrediteditor.html"},1500)
}else{
notify.innerHTML=`<svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.3 5.71l-1.41-1.41L12 9.59 7.11 4.7 5.7 6.11 10.59 12l-4.89 5.89 1.41 1.41L12 14.41l4.89 4.89 1.41-1.41L13.41 12z"/></svg> Wrong`
notify.className="notify error show"
setTimeout(()=>{notify.className="notify"},2000)
}
btn.innerHTML="Sign In"
},2000)
}
</script>
</body>

</html>
