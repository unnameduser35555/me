<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>End Roll Tool</title>

<style>
/* ボタン装飾 */
button {
  margin:5px 0;
  padding:8px 14px;
  font-size:1em;
  font-weight:600;
  color:white;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.3);
  border-radius:8px;
  backdrop-filter: blur(6px);
  cursor:pointer;
  transition: all 0.2s ease;
}

button:hover {
  background:rgba(255,255,255,0.2);
  transform: translateY(-2px);
  box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

/* テキストボックス装飾 */
textarea, input[type="range"] {
  width:100%;
  padding:8px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);
  color:white;
  backdrop-filter: blur(4px);
  transition: all 0.2s ease;
}

textarea:focus, input[type="range"]:focus {
  outline:none;
  border-color:rgba(255,255,255,0.6);
  background:rgba(255,255,255,0.1);
}

/* ラベルも少し見やすく */
label {
  margin-top:8px;
  font-weight:500;
  color:#eee;
}
body{
  margin:0;
  background:black;
  color:white;
  font-family:Georgia, 'Yu Mincho', 'MS Mincho', serif;
  overflow:hidden;
}

#rollContainer{
  position:relative;
  width:100%;
  height:100vh;
  overflow:hidden;
}

#rollContent{
  position:absolute;
  bottom:0;
  width:100%;
  text-align:center;
}

#rollContent p{
  margin:1em 0;
  font-size:24px;
}

#controls,#coords{
  z-index:10;
  transition:opacity .3s;
}

#controls{
  position:absolute;
  top:10px;
  left:10px;
  max-width:230px;
}

button,input,textarea{
  margin:5px 0;
  padding:6px 10px;
  font-size:1em;
}

#coords{
  position:absolute;
  top:10px;
  right:10px;
  font-size:1em;
  color:yellow;
}

#textEditor{
  display:flex;
  flex-direction:column;
  margin-top:10px;
}

#textEditor textarea{
  width:210px;
  height:110px;
  resize:none;
  background:#222;
  color:white;
  border:1px solid #555;
}

#bindInfo{
  margin-top:10px;
  padding:8px;
  background:#111;
  border:1px solid #444;
  font-size:12px;
  line-height:1.5;
}
</style>
</head>

<body>

<div id="rollContainer">
  <div id="rollContent"></div>
</div>

<div id="controls">

<button id="hudBtn">HUD切替</button>
<button id="startBtn">Start</button>
<button id="stopBtn">Stop</button>

<div id="textEditor">

<label>流れる文字</label>
<textarea id="textInput"></textarea>

<label>文字サイズ <span id="fontSizeLabel">24</span>px</label>
<input type="range" id="fontSizeRange" min="10" max="120" value="24">

<label>スクロール速度 <span id="speedLabel">1</span></label>
<input type="range" id="speedRange" min="0.1" max="10" step="0.1" value="1">

</div>

<div id="bindInfo">
<b>Commands / Bind</b><br>
#タイトル → 超大きい<br>
@タイトル → セクション<br>
.スタッフ → スタッフ文字<br>
!30! テキスト → サイズ指定<br>
Space → Start / Stop
</div>

</div>

<div id="coords">Bottom: 0px</div>

<script>
const content=document.getElementById('rollContent')
const coords=document.getElementById('coords')
const textInput=document.getElementById('textInput')
const fontSizeRange=document.getElementById('fontSizeRange')
const fontSizeLabel=document.getElementById('fontSizeLabel')
const speedRange=document.getElementById('speedRange')
const speedLabel=document.getElementById('speedLabel')
const controls=document.getElementById('controls')
const hudBtn=document.getElementById('hudBtn')

let interval
let speed=parseFloat(speedRange.value)
const resetThreshold=1000000
let hudVisible=true
let isRolling=false

function applyText(){
  const lines=textInput.value.split('\n')
  content.innerHTML=''

  lines.forEach(line=>{
    const p=document.createElement('p')

    if(line.trim()===""){
      p.innerHTML="&nbsp;"
      content.appendChild(p)
      return
    }

    let size=fontSizeRange.value

    if(line.startsWith("#")){
      p.textContent=line.substring(1)
      size=60
      p.style.fontWeight="bold"
    }
    else if(line.startsWith("@")){
      p.textContent=line.substring(1)
      size=40
      p.style.fontWeight="bold"
    }
    else if(line.startsWith(".")){
      p.textContent=line.substring(1)
      size=20
    }
    else{
      const match=line.match(/^!(\d+)!\s*(.*)/)
      if(match){
        size=match[1]
        p.textContent=match[2]
      }else{
        p.textContent=line
      }
    }

    p.style.fontSize=size+"px"
    content.appendChild(p)
  })

  // フォント固定（Georgia + 日本語フォールバック）
  document.body.style.fontFamily = "Georgia, 'Yu Mincho', 'MS Mincho', serif"
  content.style.fontFamily = "Georgia, 'Yu Mincho', 'MS Mincho', serif"
}

hudBtn.onclick=()=>{
  hudVisible=!hudVisible
  controls.style.opacity=hudVisible?1:0
  coords.style.opacity=hudVisible?1:0
}

function startRoll(){
  if(isRolling)return
  isRolling=true
  const contentHeight=content.offsetHeight
  content.style.bottom=-contentHeight+"px"
  coords.textContent="Bottom: "+(-contentHeight)+"px"

  interval=setInterval(()=>{
    let bottom=parseFloat(content.style.bottom)
    bottom+=speed
    content.style.bottom=bottom+"px"
    coords.textContent="Bottom: "+Math.round(bottom)+"px"
    if(bottom>resetThreshold){
      content.style.bottom=-contentHeight+"px"
    }
  },16)
}

function stopRoll(){
  clearInterval(interval)
  isRolling=false
}

document.getElementById('startBtn').onclick=startRoll
document.getElementById('stopBtn').onclick=stopRoll

document.addEventListener("keydown",e=>{
  if(e.code==="Space"){
    e.preventDefault()
    if(isRolling) stopRoll()
    else startRoll()
  }
})

textInput.addEventListener("input",applyText)
fontSizeRange.oninput=()=>{
  fontSizeLabel.textContent=fontSizeRange.value
  applyText()
}
speedRange.oninput=()=>{
  speed=parseFloat(speedRange.value)
  speedLabel.textContent=speed
}

/* 初期テキスト */
textInput.value=`#作品タイトル

.監督
名前

.音楽
作曲者

!56!SPECIAL THANKS

スタッフA
スタッフB
`

applyText()
</script>

</body>
</html>
